<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Brain Arcade — Control</title>
<meta name="theme-color" content="#0B1020" />
<!-- Home-screen app icon + standalone behaviour -->
<link rel="manifest" href="/site.webmanifest" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Arcade Control" />
<meta name="application-name" content="Arcade Control" />
<style>
    :root { --bg:#0B1020; --card:#171F3A; --card2:#1E2748; --line:rgba(255,255,255,.09); --text:#EEF2FF; --muted:#98A2C7; --accent:#7C5CFF; --accent2:#22D3EE; --good:#34D399; --bad:#F87171; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:radial-gradient(900px 500px at 10% -10%,rgba(124,92,255,.2),transparent),var(--bg); color:var(--text); -webkit-text-size-adjust:100%; overflow-x:hidden; }
    header { padding:calc(14px + env(safe-area-inset-top)) 16px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(11,16,32,.92); backdrop-filter:blur(8px); z-index:5; }
    header h1 { font-size:18px; margin:0; }
    header .mk { font-size:22px; }
    .brand-txt { background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:800; }
    .wrap { max-width:900px; margin:0 auto; padding:16px 14px calc(28px + env(safe-area-inset-bottom)); }
    .muted { color:var(--muted); font-size:13px; }
    .device { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:16px; box-shadow:0 10px 30px rgba(0,0,0,.3); }
    .device .top { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .dot { width:12px; height:12px; border-radius:50%; background:var(--muted); flex:0 0 auto; }
    .dot.online { background:var(--good); box-shadow:0 0 8px var(--good); }
    .dot.offline { background:var(--bad); }
    .name { font-weight:800; font-size:17px; }
    .id { font-family:monospace; font-size:11px; color:var(--muted); word-break:break-all; }
    .spacer { flex:1; }
    .row { display:flex; align-items:center; gap:10px; margin-top:14px; flex-wrap:wrap; }
    .btn { border:1px solid var(--line); background:var(--card2); color:var(--text); padding:12px 16px; border-radius:12px; font-weight:700; cursor:pointer; font-size:15px; min-height:46px; }
    .btn:active { transform:scale(.96); }
    .btn.primary { background:linear-gradient(90deg,var(--accent),var(--accent2)); border:none; }
    .btn.danger { background:#7F1D1D; border-color:#b91c1c; }
    .btn.active { outline:2px solid var(--accent2); }
    .games { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; margin-top:12px; }
    .games label { display:flex; align-items:center; gap:10px; background:var(--card2); padding:12px 12px; border-radius:10px; font-size:14px; cursor:pointer; border:1px solid transparent; }
    .games label.on { border-color:var(--accent); }
    .games input { accent-color:var(--accent); width:20px; height:20px; flex:0 0 auto; }
    .lockbadge { font-size:12px; padding:3px 9px; border-radius:20px; background:#7F1D1D; color:#fff; }
    .tools { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
    input.token { background:var(--card2); border:1px solid var(--line); color:var(--text); padding:12px 14px; border-radius:12px; font-size:16px; min-height:46px; }
    input.token:focus { outline:none; border-color:var(--accent); }
    .empty { text-align:center; color:var(--muted); padding:50px 0; }
    .mini { font-size:12px; color:var(--muted); }
    a.btn { text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:6px; }

    /* ===== Remote-control modal ===== */
    .modal { position:fixed; inset:0; background:rgba(4,7,18,.94); z-index:50; display:flex; flex-direction:column; align-items:center; padding:calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom)); }
    .modal .mhead { display:flex; align-items:center; gap:10px; width:100%; max-width:520px; margin-bottom:12px; }
    .modal .mhead .name { font-size:16px; }
    .modal .screen-wrap { position:relative; flex:1; width:100%; max-width:520px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .modal img.screen { max-width:100%; max-height:100%; border-radius:18px; border:2px solid var(--line); background:#000; cursor:crosshair; touch-action:none; }
    .modal .waiting { color:var(--muted); text-align:center; }
    .tapdot { position:absolute; width:26px; height:26px; margin:-13px 0 0 -13px; border-radius:50%; border:3px solid var(--accent2); pointer-events:none; animation:tapfade .5s ease-out forwards; }
    @keyframes tapfade { from{transform:scale(.4);opacity:1;} to{transform:scale(1.4);opacity:0;} }
    .modal .mhint { color:var(--muted); font-size:12px; margin-top:10px; text-align:center; max-width:520px; }

    /* ===== Phone layout ===== */
    @media (max-width:600px) {
      header h1 { font-size:16px; }
      header .play-btn { margin-left:auto; padding:10px 14px; min-height:0; }
      .wrap { padding:14px 12px calc(28px + env(safe-area-inset-bottom)); }
      .device { padding:14px 12px; }
      .games { grid-template-columns:1fr 1fr; }
      .row .btn { flex:1 1 46%; }
      .row .btn.primary { flex-basis:100%; order:5; }
      input.token { width:100%; }
      .tools .muted { flex-basis:100%; }
    }
</style>
</head>
<body>
<header>
    <span class="mk">&#127918;</span>
    <h1><span class="brand-txt">Brain Arcade</span> &middot; Control</h1>
    <span class="spacer"></span>
    <a class="btn primary play-btn" href="/play/">&#127918; Play games</a>
</header>
<div class="wrap">
    <div class="tools">
        <span class="muted">Devices check in every ~15s. Changes apply on their next check-in.</span>
        <span class="spacer"></span>
        <input class="token" id="token" placeholder="Admin token (if set)" autocomplete="off" autocapitalize="off" autocorrect="off" style="display:none" />
    </div>
    <div id="list"><div class="empty">Waiting for devices to check in…</div></div>
</div>
<script>
// Fallback list, used only until a tablet reports its own game list.
var GAMES = [
    ["tetris","Tetris"],["blockblast","Block Blast"],["g2048","2048"],["chess","Chess"],
    ["solitaire","Solitaire"],["rushhour","Rush Hour"],["reversi","Reversi"],["mathblitz","Math Blitz"],
    ["stroop","Color Clash"],["wordle","Wordle"],["snake","Snake"],["memory","Memory Match"],
    ["mines","Minesweeper"],["sudoku","Sudoku"],["simon","Simon Says"],["ttt","Tic-Tac-Toe"],
    ["c4","Connect Four"],["breakout","Breakout"],["whack","Whack-a-Mole"],["puzzle15","15 Puzzle"],
    ["flappy","Flappy Bird"],["pong","Pong"],["reaction","Reaction Time"],["fruitcatch","Fruit Catch"]
];
// Each tablet reports the games it actually has; use that when present.
function gamesFor(d){
    if (d && d.games && d.games.length) return d.games.map(function(g){ return [g.id, g.name]; });
    return GAMES;
}
var draft = {}; // deviceId -> {locked, allowedGames}

var tokenEl = document.getElementById("token");
// Remember the admin token in this browser so you only enter it once.
try { tokenEl.value = localStorage.getItem("ba_admin_token") || ""; } catch (e) {}
tokenEl.addEventListener("input", function () { try { localStorage.setItem("ba_admin_token", tokenEl.value.trim()); } catch (e) {} });

fetch("/api/config").then(function(r){return r.json();}).then(function(c){
    if (c.authRequired) tokenEl.style.display = "inline-block";
});

function token(){ return tokenEl.value.trim(); }
function ago(ms){ var s=Math.round((Date.now()-ms)/1000); if(s<60)return s+"s ago"; if(s<3600)return Math.round(s/60)+"m ago"; return Math.round(s/3600)+"h ago"; }

function render(devices){
    var list=document.getElementById("list");
    if(!devices.length){ list.innerHTML='<div class="empty">No devices yet. Open the app on a tablet with the control URL set in Settings.</div>'; return; }
    list.innerHTML="";
    devices.forEach(function(d){
        if(!draft[d.id]) draft[d.id]={ locked:d.policy.locked, allowedGames:d.policy.allowedGames };
        var st=draft[d.id];
        var card=document.createElement("div"); card.className="device";
        var allowed = st.allowedGames; // null = all
        var gameList = gamesFor(d);
        var checks = gameList.map(function(g){
            var on = !allowed || allowed.indexOf(g[0])>-1;
            return '<label class="'+(on?'on':'')+'"><input type="checkbox" data-dev="'+d.id+'" data-game="'+g[0]+'" '+(on?'checked':'')+'/> '+esc(g[1])+'</label>';
        }).join("");
        card.innerHTML =
            '<div class="top">'+
                '<span class="dot '+(d.online?'online':'offline')+'"></span>'+
                '<span class="name">'+esc(d.name)+'</span>'+
                (st.locked?'<span class="lockbadge">LOCKED</span>':'')+
                '<span class="spacer"></span>'+
                '<span class="mini">'+(d.online?'online':'last seen '+ago(d.lastSeen))+' &middot; v'+esc(d.app||'?')+(d.battery!=null?' &middot; &#128267;'+d.battery+'%':'')+' &middot; '+gameList.length+' games</span>'+
            '</div>'+
            '<div class="id">'+esc(d.id)+'</div>'+
            '<div class="row">'+
                '<button class="btn '+(st.locked?'danger active':'')+'" data-lock="'+d.id+'">'+(st.locked?'🔒 Locked — tap to unlock':'🔓 Lock this tablet')+'</button>'+
                '<button class="btn" data-all="'+d.id+'">Allow all</button>'+
                '<button class="btn" data-none="'+d.id+'">Allow none</button>'+
                '<button class="btn primary" data-save="'+d.id+'">Save changes</button>'+
            '</div>'+
            '<div class="row">'+
                '<button class="btn" data-msg="'+d.id+'">&#128172; Send message</button>'+
                '<button class="btn" data-remote="'+d.id+'"'+(d.online?'':' disabled style="opacity:.5"')+'>&#128241; Remote control</button>'+
                '<button class="btn" data-update="'+d.id+'">&#11015;&#65039; Update app</button>'+
                (!d.online?'<button class="btn danger" data-remove="'+d.id+'">&#128465; Remove device</button>':'')+
            '</div>'+
            '<div class="mini" style="margin-top:12px">Allowed games (unchecked = hidden on the tablet):</div>'+
            '<div class="games">'+checks+'</div>';
        list.appendChild(card);
    });
    wire();
}
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function wire(){
    document.querySelectorAll("[data-lock]").forEach(function(b){ b.onclick=function(){ var id=b.getAttribute("data-lock"); draft[id].locked=!draft[id].locked; poll(true); }; });
    document.querySelectorAll("[data-all]").forEach(function(b){ b.onclick=function(){ draft[b.getAttribute("data-all")].allowedGames=null; poll(true); }; });
    document.querySelectorAll("[data-none]").forEach(function(b){ b.onclick=function(){ draft[b.getAttribute("data-none")].allowedGames=[]; poll(true); }; });
    document.querySelectorAll('.games input').forEach(function(cb){ cb.onchange=function(){
        var id=cb.getAttribute("data-dev"), g=cb.getAttribute("data-game");
        var st=draft[id];
        var d=lastDevices.filter(function(x){return x.id===id;})[0];
        if(!st.allowedGames) st.allowedGames=gamesFor(d).map(function(x){return x[0];});
        var i=st.allowedGames.indexOf(g);
        if(cb.checked){ if(i<0) st.allowedGames.push(g); } else { if(i>-1) st.allowedGames.splice(i,1); }
        poll(true);
    }; });
    document.querySelectorAll("[data-save]").forEach(function(b){ b.onclick=function(){ save(b.getAttribute("data-save")); }; });
    document.querySelectorAll("[data-msg]").forEach(function(b){ b.onclick=function(){ var id=b.getAttribute("data-msg");
        var text=prompt("Message to show on the tablet:");
        if(text==null||!text.trim()) return;
        fetch("/api/command",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":token()},body:JSON.stringify({deviceId:id,action:"popup",text:text.trim()})})
        .then(function(r){ if(r.status===401){alert("Wrong admin token");return;} b.textContent="Sent ✓"; setTimeout(function(){b.innerHTML="&#128172; Send message";},1500); }); }; });
    document.querySelectorAll("[data-remote]").forEach(function(b){ b.onclick=function(){ if(b.disabled) return; openRemote(b.getAttribute("data-remote")); }; });
    document.querySelectorAll("[data-update]").forEach(function(b){ b.onclick=function(){ var id=b.getAttribute("data-update");
        fetch("/api/command",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":token()},body:JSON.stringify({deviceId:id,action:"update"})})
        .then(function(r){ if(r.status===401){alert("Wrong admin token");return;} b.textContent="Update queued ✓"; setTimeout(function(){b.innerHTML="&#11015;&#65039; Update app";},1500); }); }; });
    document.querySelectorAll("[data-remove]").forEach(function(b){ b.onclick=function(){ var id=b.getAttribute("data-remove");
        if(!confirm("Remove this device from the dashboard? It will reappear if it checks in again.")) return;
        fetch("/api/device/remove",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":token()},body:JSON.stringify({deviceId:id})})
        .then(function(r){ if(r.status===401){alert("Wrong admin token");return;} delete draft[id]; poll(); }); }; });
}
function save(id){
    var st=draft[id];
    fetch("/api/policy",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":token()},
        body:JSON.stringify({deviceId:id,locked:st.locked,allowedGames:st.allowedGames})})
    .then(function(r){ if(r.status===401){alert("Wrong admin token");return;} return r.json(); })
    .then(function(){ var el=document.querySelector('[data-save="'+id+'"]'); if(el){el.textContent="Saved ✓"; setTimeout(function(){el.textContent="Save changes";},1200);} });
}
var lastDevices=[];
function poll(fromDraft){
    if(fromDraft){ render(lastDevices); return; }
    fetch("/api/devices").then(function(r){return r.json();}).then(function(data){ lastDevices=data.devices; render(data.devices); }).catch(function(){});
}
/* ===== Remote control: live view + tap replay ===== */
var remote = null; // { id, frameTimer, modal }
function openRemote(id){
    var d=lastDevices.filter(function(x){return x.id===id;})[0];
    var name=d?d.name:"Tablet";
    // Screen capture is a native feature of the installed app; the WiFi game
    // update can't add it. If the tablet reports it can't capture, say so.
    if(d && d.canStream===false){
        alert("This tablet can’t share its screen yet.\n\nScreen view + remote control need the latest Brain Arcade APK installed ON THE TABLET (v1.6.0 or newer). The over-the-WiFi game update is not enough — it can’t add screen capture.\n\nOn the tablet: Settings → Check for updates, then tap Install when the update is offered.");
        return;
    }
    // Ask the tablet to start streaming (it only streams while this is on).
    fetch("/api/command",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":token()},body:JSON.stringify({deviceId:id,action:"stream",on:true})})
    .then(function(r){ if(r.status===401){alert("Wrong admin token");return;}
        var m=document.createElement("div"); m.className="modal";
        m.innerHTML=
            '<div class="mhead">'+
                '<span class="name">&#128241; '+esc(name)+'</span>'+
                '<span class="spacer"></span>'+
                '<button class="btn primary" id="rc-close">Close</button>'+
            '</div>'+
            '<div class="screen-wrap"><div class="waiting" id="rc-wait">Waiting for the tablet’s screen…<br><span class="mini">The tablet starts sharing on its next check-in (up to ~15s). If nothing appears, install the latest APK on the tablet.</span></div></div>'+
            '<div class="mhint">Tap the screen to tap on the tablet. This controls the Brain Arcade app only. Streaming stops when you close this.</div>';
        document.body.appendChild(m);
        remote={ id:id, modal:m, frameTimer:null };
        document.getElementById("rc-close").onclick=closeRemote;
        pullFrame();
        remote.frameTimer=setInterval(pullFrame, 1200);
    });
}
function pullFrame(){
    if(!remote) return;
    fetch("/api/frame?deviceId="+encodeURIComponent(remote.id)).then(function(r){return r.json();}).then(function(f){
        if(!remote) return;
        var wrap=remote.modal.querySelector(".screen-wrap");
        if(!f.data){ return; }
        var img=remote.modal.querySelector("img.screen");
        if(!img){
            wrap.innerHTML="";
            img=document.createElement("img"); img.className="screen"; wrap.appendChild(img);
            img.addEventListener("click",function(e){ sendTap(img,e.clientX,e.clientY); });
        }
        img.src="data:image/jpeg;base64,"+f.data;
    }).catch(function(){});
}
function sendTap(img,cx,cy){
    var rect=img.getBoundingClientRect();
    var x=(cx-rect.left)/rect.width, y=(cy-rect.top)/rect.height;
    if(x<0||x>1||y<0||y>1) return;
    // visual ping
    var dot=document.createElement("div"); dot.className="tapdot";
    dot.style.left=(cx-remote.modal.querySelector(".screen-wrap").getBoundingClientRect().left)+"px";
    dot.style.top=(cy-remote.modal.querySelector(".screen-wrap").getBoundingClientRect().top)+"px";
    remote.modal.querySelector(".screen-wrap").appendChild(dot);
    setTimeout(function(){ if(dot.parentNode)dot.parentNode.removeChild(dot); },500);
    fetch("/api/input",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":token()},body:JSON.stringify({deviceId:remote.id,x:x,y:y})}).catch(function(){});
}
function closeRemote(){
    if(!remote) return;
    var id=remote.id;
    clearInterval(remote.frameTimer);
    if(remote.modal.parentNode) remote.modal.parentNode.removeChild(remote.modal);
    remote=null;
    fetch("/api/command",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":token()},body:JSON.stringify({deviceId:id,action:"stream",on:false})}).catch(function(){});
}

poll(); setInterval(poll, 3000);
</script>
</body>
</html>
